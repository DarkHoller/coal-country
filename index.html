  { keywords: ["doctor","nurse visit","patent medicine","physician"], img: () => imgDoctor },
];

function getEventImage(headline, narrative) {
  const text = ((headline || "") + " " + (narrative || "")).toLowerCase();
  for (const rule of EVENT_IMAGE_RULES) {
    if (rule.keywords.some(k => text.includes(k))) return rule.img();
  }
  return null;
}

function clamp(v, lo=0, hi=100){ return Math.max(lo, Math.min(hi, v)); }

function StatBar({ label, value, max=100, warn=false }) {
  const pct = clamp((value / max) * 100);
  const color = warn && pct < 25 ? C.red : warn && pct < 50 ? C.yellow : C.white;
  return (
    <div style={S.statRow}>
      <span style={S.statLbl}>{label}</span>
      <div style={S.statTrk}>
        <div style={{ width:`${pct}%`, background:color, height:"100%" }} />
      </div>
      <span style={{ ...S.statVal, color }}>{value}</span>
    </div>
  );
}

function DeltaBadge({ val, unit="", invert=false }) {
  if (!val || val === 0) return null;
  const bad = invert ? val > 0 : val < 0;
  return (
    <span style={{ ...S.deltaTag, color: bad ? C.red : C.green }}>
      {val > 0 ? "+" : ""}{val}{unit}
    </span>
  );
}

function Timeline({ year, seasonIdx }) {
  const totalSeasons = (END_YEAR - START_YEAR + 1) * 4;
  const doneSeasons  = (year - START_YEAR) * 4 + seasonIdx;
  const pct          = Math.min(100, Math.round((doneSeasons / totalSeasons) * 100));
  const yearsLeft    = END_YEAR - year;
  const seasonsLeft  = (3 - seasonIdx) + (yearsLeft * 4);

  // Milestone years to tick on the bar
  const milestones = [1914, 1920, 1925, 1930, 1935];

  return (
    <div style={{ marginBottom:"12px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", fontSize:"7px", color:C.gray, marginBottom:"4px" }}>
        <span>1910</span>
        <span style={{ color:C.yellow }}>SURVIVE TO 1935</span>
        <span>1935</span>
      </div>
      {/* Track */}
      <div style={{ position:"relative", background:"#222", height:"12px", border:`1px solid ${C.dgray}` }}>
        {/* Filled progress */}
        <div style={{ width:`${pct}%`, background:C.white, height:"100%", transition:"width 0.3s" }} />
        {/* Milestone ticks */}
        {milestones.map(my => {
          const tickPct = ((my - START_YEAR) / (END_YEAR - START_YEAR)) * 100;
          const passed  = year > my || (year === my);
          return (
            <div key={my} style={{
              position:"absolute", top:0, left:`${tickPct}%`,
              width:"2px", height:"100%",
              background: passed ? C.dgray : C.dgray,
              opacity: 0.7,
            }} />
          );
        })}
      </div>
      {/* Milestone labels */}
      <div style={{ position:"relative", height:"14px", marginTop:"2px" }}>
        {milestones.map(my => {
          const tickPct = ((my - START_YEAR) / (END_YEAR - START_YEAR)) * 100;
          return (
            <span key={my} style={{
              position:"absolute",
              left:`${tickPct}%`,
              transform:"translateX(-50%)",
              fontSize:"6px",
              color: year >= my ? C.white : C.dgray,
            }}>{my}</span>
          );
        })}
      </div>
      <div style={{ fontSize:"7px", color:C.gray, marginTop:"4px" }}>
        {pct}% COMPLETE  /  {seasonsLeft} SEASONS REMAINING
      </div>
    </div>
  );
}

                lines:["Keep the family fed.", "Supplement wages through baking.", "Hold the household together."] },
            ].map(c => (
              <button key={c.id}
                style={{ ...S.btn, ...(charType===c.id ? S.btnSelected : {}) }}
                onClick={() => setCharType(c.id)}>
                <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"6px" }}>
                  <img src={c.img} alt="" style={{ width:"48px", height:"48px", imageRendering:"pixelated" }} />
                  <span style={{ color:charType===c.id ? C.yellow : C.white }}>{charType===c.id ? "> " : "  "}{c.label}</span>
                </div>
                {c.lines.map((l,i) => (
                  <div key={i} style={{ color:C.gray, fontSize:"8px" }}>  {l}</div>
                ))}
              </button>
            ))}
            {charType && (
              <div style={{ textAlign:"right" }}>
                <button style={S.btnBig} onClick={() => setStep(1)}>NEXT &gt;</button>
              </div>
            )}
          </>
        )}

        {/* STEP 1: Ethnicity */}
        {step === 1 && (
          <>
            <div style={{ fontSize:"9px", color:C.gray, marginBottom:"14px", lineHeight:2 }}>
              The mines drew workers from across<br/>
              America and the world. Who are you?
            </div>
            {ETHNICITIES.map(e => (
              <button key={e.id}
                style={{ ...S.btn, ...(ethnicity===e.id ? S.btnSelected : {}) }}
                onClick={() => setEthnicity(e.id)}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
                  <span style={{ color:ethnicity===e.id ? C.yellow : C.white }}>
                    {ethnicity===e.id ? "> " : "  "}{e.label}
                  </span>
                  <span style={{ color:C.green, fontSize:"7px" }}>{e.bonusLabel}</span>
                </div>
                <div style={{ color:C.gray, fontSize:"8px", marginTop:"4px" }}>  {e.origin}</div>
                {ethnicity===e.id && (
                  <div style={{ color:C.offwhite, fontSize:"8px", marginTop:"8px", borderTop:`1px solid ${C.dgray}`, paddingTop:"8px", lineHeight:1.9 }}>
                    {e.note}
                  </div>
                )}
              </button>
            ))}
            {ethnicity && (
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <button style={S.btnSm} onClick={() => setStep(0)}>&lt; BACK</button>
                <button style={S.btnBig} onClick={() => setStep(2)}>NEXT &gt;</button>
              </div>
            )}
          </>
        )}

        {/* STEP 2: Camp */}
        {step === 2 && (
          <>
            <div style={{ fontSize:"9px", color:C.gray, marginBottom:"14px", lineHeight:2 }}>
              Choose the coal camp where your<br/>
              family will live and work:
            </div>
            {COAL_CAMPS.map(c => (
              <button key={c.id}
                style={{ ...S.btn, ...(camp===c.id ? S.btnSelected : {}) }}
                onClick={() => setCamp(c.id)}>
                <div style={{ display:"flex", justifyContent:"space-between" }}>
                  <span style={{ color:camp===c.id ? C.yellow : C.white }}>
                    {camp===c.id ? "> " : "  "}{c.label}
                  </span>
                  <span style={{ color:C.gray, fontSize:"7px" }}>{c.county}</span>
                </div>
                {camp===c.id && (
                  <div style={{ color:C.offwhite, fontSize:"8px", marginTop:"8px", borderTop:`1px solid ${C.dgray}`, paddingTop:"8px", lineHeight:1.9 }}>
                    <div>{c.note}</div>
                    {c.history && (
                      <div style={{ color:C.green, marginTop:"6px", borderTop:`1px solid ${C.dgray}`, paddingTop:"6px" }}>
                        {c.history}
                      </div>
                    )}
                  </div>
                )}
              </button>
            ))}
            {camp && (
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <button style={S.btnSm} onClick={() => setStep(1)}>&lt; BACK</button>
                <button style={S.btnBig} onClick={() => setStep(3)}>NEXT &gt;</button>
              </div>
            )}
          </>
        )}

        {/* STEP 3: Name */}
        {step === 3 && (
          <>
            <div style={{ fontSize:"9px", color:C.gray, marginBottom:"14px", lineHeight:2 }}>
              What is your name?
            </div>
            <input style={S.input} value={name} onChange={e=>setName(e.target.value)} placeholder="your name..." autoFocus />

            {name.length > 1 && (
              <div style={{ marginTop:"16px" }}>
                <div style={S.infoBox}>
                  <SectionLabel>YOUR FAMILY</SectionLabel>
                  <div>Name:       {name}</div>
                  <div>Role:       {charType==="miner" ? "Coal Miner" : "Miner's Wife"}</div>
                  <div>Background: {ETHNICITIES.find(e=>e.id===ethnicity)?.label}</div>
                  <div>Camp:       {COAL_CAMPS.find(c=>c.id===camp)?.label}</div>
                  <div>Debt:       $40 scrip (company advance)</div>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between" }}>
                  <button style={S.btnSm} onClick={() => setStep(2)}>&lt; BACK</button>
                  <button style={S.btnBig} onClick={startGame}>BEGIN JOURNEY &gt;</button>
                </div>
              </div>
            )}
          </>
        )}
      </div>
    );
  }

  // ── END ───────────────────────────────────────────────────────────────────────
  if (screen === "end") return (
    <div style={S.page}>
      <img
        src={endMsg.includes("evict") || endMsg.includes("debt") ? imgEvicted : imgGraveyard}
        alt="End"
        style={{ width:"100%", display:"block", imageRendering:"pixelated", marginBottom:"10px", borderBottom:`2px solid ${C.dgray}` }}
      />
      <HR/>
      <div style={{ textAlign:"center", color:C.red, fontSize:"14px", margin:"20px 0", lineHeight:1.8 }}>
        THE STORY<br/>ENDS HERE
      </div>
      <HR/>
      <div style={{ fontSize:"9px", color:C.offwhite, lineHeight:2.2, maxWidth:"520px" }}>
        {endMsg}
      </div>
      <div style={{ color:C.dgray, fontSize:"8px", marginTop:"14px" }}>
        Year {player?.year}  /  {player?.turns||0} seasons survived
      </div>
      <div style={{ textAlign:"center", marginTop:"20px" }}>
        <button style={S.btnBig} onClick={reset}>PLAY AGAIN</button>
      </div>
    </div>
  );

  // ── WON ───────────────────────────────────────────────────────────────────────
  if (screen === "won") return (
    <div style={S.page}>
      <img src={imgVictory} alt="Victory" style={{ width:"100%", display:"block", imageRendering:"pixelated", marginBottom:"10px", borderBottom:`2px solid ${C.dgray}` }} />
      <HR/>
      <div style={{ textAlign:"center", color:C.green, fontSize:"12px", margin:"20px 0", lineHeight:1.8 }}>
        {player?.name}<br/>SURVIVED TO 1935
      </div>
      <HR/>
      <div style={{ fontSize:"9px", color:C.offwhite, lineHeight:2.2, maxWidth:"520px" }}>
        <p>The coal companies eventually closed their gates. You outlasted them.</p>
        <p>In 1935, the Social Security Act passed — the first federal safety net for American workers. The labor organizing that coal miners helped build made it possible.</p>
        {player?.blackLung > 55 && (
          <p style={{ color:C.yellow }}>Your lungs bore the cost. Black lung was not recognized as a compensable disease until 1969.</p>
        )}
      </div>
      <div style={{ color:C.dgray, fontSize:"8px", marginTop:"14px" }}>
        Health: {player?.health}  /  Debt: ${player?.debt}  /  {player?.turns} seasons
      </div>
      <div style={{ textAlign:"center", marginTop:"20px" }}>
        <button style={S.btnBig} onClick={reset}>PLAY AGAIN</button>
      </div>
    </div>
  );

  if (!player) return null;

  const campObj2   = COAL_CAMPS.find(c => c.id === player.camp);
  const campName   = campObj2?.label   || "";
  const companyName = campObj2?.company || "The Company";

  // ── PLAYING ───────────────────────────────────────────────────────────────────
  if (screen === "playing") return (
    <div style={S.page}>
      {/* Seasonal scene image */}
      {SEASON_IMAGES[season] && (
        <img
          src={SEASON_IMAGES[season]}
          alt={season + " in the coal camp"}
          style={{ width:"100%", display:"block", imageRendering:"pixelated", marginBottom:"10px", borderBottom:`2px solid ${C.dgray}` }}
        />
      )}
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:"8px", color:C.gray, marginBottom:"6px" }}>
        <span>COAL COUNTRY</span>
        <span>{season.toUpperCase()} {player.year}</span>
        <button style={{ ...S.btnSm, fontSize:"7px", padding:"4px 8px", marginBottom:0 }} onClick={reset}>
          RESTART
        </button>
      </div>
      <div style={{ fontSize:"8px", color:C.dgray, marginBottom:"10px" }}>
        {campName.toUpperCase()}  /  {player.name.toUpperCase()}
      </div>

      {/* Timeline */}
      <Timeline year={player.year} seasonIdx={player.seasonIdx} />

      <HR/>

      {/* Stats */}
      <StatBar label="HEALTH"     value={player.health}    warn />
      <StatBar label="FOOD"       value={player.food}      warn />
      {player.character === "miner" &&
        <StatBar label="BLACK LUNG" value={player.blackLung} />}

      <div style={{ display:"flex", gap:"18px", marginTop:"10px", fontSize:"8px", color:C.gray }}>
        <span>SCRIP: <span style={{ color:C.white }}>${player.scrip}</span></span>
        <span>DEBT: <span style={{ color:player.debt>100?C.red:player.debt>70?C.yellow:C.white }}>${player.debt}</span></span>
        <span>FAMILY: <span style={{ color:C.white }}>{player.family}/4</span></span>
      </div>

      <HR/>

      {/* Season prompt */}
      <div style={{ fontSize:"9px", color:C.offwhite, marginBottom:"14px", lineHeight:2 }}>
        {season.toUpperCase()} {player.year} — 3 MONTHS<br/>
        <span style={{ color:C.gray }}>
          {player.character === "miner"
            ? "How will you approach the next 3 months?"
            : "What will be your focus this season?"}
        </span>
      </div>

      {/* Work options with inline delta preview */}
      {WORK_OPTIONS[player.character].map((opt, i) => {
        const optImg = player.character === "miner" ? MINER_FACE[opt.id] : WIFE_ICON[opt.id];
        return (
          <button key={opt.id} style={S.btn} onClick={() => handleWork(opt)}>
            <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
              {optImg && <img src={optImg} alt="" style={{ width:"44px", height:"44px", imageRendering:"pixelated", flexShrink:0 }} />}
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"4px" }}>
                  <span style={{ color:C.white }}>{i+1}. {opt.label}</span>
                  <span style={{ fontSize:"8px" }}>
                    <DeltaBadge val={opt.scrip}   unit="$ scrip" />
                    <DeltaBadge val={opt.health}  unit=" hp" />
                    {opt.lung !== 0 && player.character === "miner" &&
                      <DeltaBadge val={opt.lung} unit=" lung" invert />}
                    {opt.food !== 0 &&
                      <DeltaBadge val={opt.food} unit=" food" />}
                  </span>
                </div>
                <div style={{ color:C.gray, fontSize:"8px" }}>{opt.desc}</div>
              </div>
            </div>
          </button>
        );
      })}

      <div style={{ marginTop:"12px", borderTop:`2px solid ${C.dgray}`, paddingTop:"12px" }}>
        {/* Doctor */}
        <button
          style={{
            ...S.btn,
            marginBottom:"8px",
            borderColor: player.scrip >= 10 ? C.white : C.dgray,
            opacity: player.scrip >= 10 ? 1 : 0.5,
          }}
          onClick={() => {
            if (player.scrip < 10) { addLog("Cannot afford the company doctor ($10 scrip)."); return; }
            const p = {...player};
            p.scrip  -= 10;
            p.health  = clamp(p.health + 28);
            addLog("Visited the company doctor. Health improved. ($10 scrip)");
            setPlayer(p);
          }}
        >
          <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
            <img src={imgDoctor} alt="" style={{ width:"48px", height:"48px", imageRendering:"pixelated", flexShrink:0 }} />
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span style={{ color:C.white }}>VISIT COMPANY DOCTOR</span>
                <span style={{ fontSize:"8px" }}>
                  <span style={{ color:C.red }}>-$10 scrip</span>
                  <span style={{ color:C.green, marginLeft:"8px" }}>+28 health</span>
                </span>
              </div>
              <div style={{ color:C.gray, fontSize:"8px", marginTop:"4px" }}>
                Company doctors worked for the company, not the miner.
              </div>
            </div>
          </div>
        </button>

        {/* Company Store */}
        <button
          style={{
            ...S.btnBig,
            width:"100%",
            textAlign:"center",
            fontSize:"9px",
            padding:"12px",
            marginTop:0,
            letterSpacing:"2px",
            borderColor: C.yellow,
            color: C.yellow,
          }}
          onClick={() => setScreen("store")}
        >
          [S] COMPANY STORE
        </button>
        {player.debt > 0 && player.scrip > 0 &&
          <button
            style={{ ...S.btnSm, width:"100%", textAlign:"center", marginTop:"6px", marginRight:0 }}
            onClick={payDebt}
          >
            [P] PAY DEBT  ${Math.min(player.scrip, player.debt)}
          </button>}
      </div>

      {log.length > 0 && (
        <div style={{ borderTop:`1px solid ${C.dgray}`, marginTop:"14px", paddingTop:"10px" }}>
          <SectionLabel>-- SEASON LOG --</SectionLabel>
          {log.slice(0,5).map((e,i) => (
            <div key={i} style={{ ...S.logLine, opacity:Math.max(0.15,1-i*0.18) }}>
              &gt; {e}
            </div>
          ))}
        </div>
      )}
    </div>
  );

  // ── EVENT ─────────────────────────────────────────────────────────────────────
  if (screen === "event") return (
    <div style={S.page}>
      {SEASON_IMAGES[season] && (
        <img
          src={SEASON_IMAGES[season]}
          alt={season + " in the coal camp"}
          style={{ width:"100%", display:"block", imageRendering:"pixelated", marginBottom:"10px", borderBottom:`2px solid ${C.dgray}` }}
        />
      )}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:"8px", color:C.gray, marginBottom:"6px" }}>
        <span>COAL COUNTRY</span>
        <span>{season.toUpperCase()} {player.year}</span>
        <button style={{ ...S.btnSm, fontSize:"7px", padding:"4px 8px", marginBottom:0 }} onClick={reset}>
          RESTART
        </button>
      </div>
      <HR/>

      {loading ? (
        <div style={{ textAlign:"center", margin:"60px 0", lineHeight:3 }}>
          <div style={{ color:C.white, fontSize:"12px" }}>. . .</div>
          <div style={{ color:C.gray, fontSize:"8px" }}>loading historical event</div>
        </div>
      ) : event ? (
        <>
          {(() => {
            const evtImg = getEventImage(event.headline, event.narrative);
            return evtImg ? (
              <img
                src={evtImg}
                alt=""
                style={{ width:"100%", display:"block", imageRendering:"pixelated",
                         marginBottom:"12px", borderBottom:`2px solid ${C.dgray}` }}
              />
            ) : null;
          })()}
          <div style={S.headline}>{event.headline?.toUpperCase()}</div>
          <div style={S.narr}>{event.narrative}</div>

          {event.fact && (
            <div style={S.factBox}>
              <div style={{ color:C.green, fontSize:"7px", letterSpacing:"2px", marginBottom:"6px" }}>
                -- HISTORICAL RECORD --
              </div>
              {event.fact}
            </div>
          )}

          <HR/>
          <div style={{ fontSize:"9px", color:C.gray, marginBottom:"10px" }}>
            WHAT DO YOU DO?
          </div>

          {event.choices?.map((c, i) => (
            <button key={i} style={S.btn} onClick={() => handleChoice(c)}>
              {/* Choice label + stat preview on same row */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: c.outcome ? "6px" : 0 }}>
                <span style={{ color:C.white }}>
                  {i+1}. {c.text}
                </span>
                <span style={{ fontSize:"7px", textAlign:"right" }}>
                  {c.health !== 0 && <DeltaBadge val={c.health} unit="hp" invert />}
                  {c.scrip  !== 0 && <DeltaBadge val={c.scrip}  unit="$"  />}
                  {c.debt   !== 0 && <DeltaBadge val={-c.debt}  unit="$ debt" />}
                  {c.food   !== 0 && <DeltaBadge val={c.food}   unit=" food" />}
                  {c.lung   !== 0 && player.character === "miner" &&
                    <DeltaBadge val={c.lung} unit=" lung" invert />}
                  {c.family !== 0 && <DeltaBadge val={c.family} unit=" family" invert />}
                </span>
              </div>
              {/* Outcome preview in dim text */}
              {c.outcome && (
                <div style={{ color:C.dgray, fontSize:"8px", lineHeight:1.8 }}>
                  &gt; {c.outcome}
                </div>
              )}
            </button>
          ))}
        </>
      ) : null}
    </div>
  );

  // ── STORE ─────────────────────────────────────────────────────────────────────
  if (screen === "store") return (
    <div style={S.page}>
      <img src={imgStoreInterior} alt="Company Store" style={{ width:"100%", display:"block", imageRendering:"pixelated", marginBottom:"12px", borderBottom:`2px solid ${C.dgray}` }} />
      <div style={{ color:C.white, fontSize:"10px", letterSpacing:"2px", marginBottom:"4px" }}>
        {companyName.toUpperCase()}
      </div>
      <div style={{ color:C.gray, fontSize:"8px", letterSpacing:"2px", marginBottom:"14px" }}>
        COMPANY STORE  ·  {campName.toUpperCase()}
      </div>

      <div style={S.factBox}>
        <div style={{ color:C.green, fontSize:"7px", letterSpacing:"2px", marginBottom:"6px" }}>
          -- HISTORICAL RECORD --
        </div>
        Company stores charged above-market prices
        and paid workers in scrip redeemable only
        at company establishments. The truck system
        was technically illegal under WV law but
        rarely enforced. Tennessee Ernie Ford's
        "Sixteen Tons" (1955) captured the reality:
        "I owe my soul to the company store."
      </div>

      <div style={{ fontSize:"9px", color:C.gray, marginBottom:"12px" }}>
        SCRIP: <span style={{ color:C.white }}>${player.scrip}</span>
        {"   "}
        DEBT: <span style={{ color:player.debt>90?C.red:C.white }}>${player.debt}</span>
      </div>
      <HR/>

      {STORE_ITEMS.map(item => {
        const off = item.minerOnly && player.character !== "miner";
        return (
          <button key={item.id}
            style={{ ...S.btn, ...(off ? { opacity:0.3, cursor:"not-allowed" } : {}) }}
            onClick={() => handleBuy(item)} disabled={off}>
            <div style={{ display:"flex", justifyContent:"space-between" }}>
              <span style={{ color:off ? C.dgray : C.white }}>{item.label}</span>
              <span style={{ color:C.yellow, fontSize:"8px" }}>${item.cost} scrip</span>
            </div>
            <div style={{ color:C.gray, fontSize:"8px", marginTop:"4px" }}>
              {item.desc}
              {item.food   > 0 && <DeltaBadge val={item.food}   unit=" food" />}
              {item.health > 0 && <DeltaBadge val={item.health} unit="hp" />}
              {item.lung   < 0 && <DeltaBadge val={item.lung}   unit=" lung" invert />}
              {item.minerOnly && <span style={{ color:C.dgray, fontSize:"7px" }}> (miners only)</span>}
            </div>
          </button>
        );
      })}

      <HR/>
      <button style={S.btnSm} onClick={() => setScreen("playing")}>&lt; BACK TO CAMP</button>
    </div>
  );

  return null;
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(CoalCountry));

  </script>
</body>
</html>
