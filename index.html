    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { background: #000; min-height: 100vh; }

    /* Range input styling */
    input[type=range] {
      -webkit-appearance: none; height: 4px; border-radius: 2px;
      background: #444; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: #ffdd00; cursor: pointer;
    }

    /* Keyboard focus highlight (accessibility) */
    button:focus-visible { outline: 2px solid #ffdd00 !important; outline-offset: 2px; }

    /* Mobile font scale */
    @media (max-width: 480px) { body { font-size: 11px; } }

    /* Print: only render the certificate */
    @media print {
      body * { visibility: hidden; }
      #certificate, #certificate * { visibility: visible; }
      #certificate { position: fixed; left: 0; top: 0; width: 100%; }
    }
  </style>

/** Get a full image URL by registry key */
function img(key) {
  const ext = IMAGES[key];
  if (!ext) console.warn("[Coal Country] Unknown image key:", key);
  return BASE_URL + key + "." + (ext || "jpg");
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function clamp(v, lo = 0, hi = 100) {
  return Math.max(lo, Math.min(hi, v));
}

/** Apply a stat-delta object to player state, respecting caps. */
function applyDeltas(p, delta) {
  const np = { ...p };
  if (delta.health !== undefined) np.health = clamp(np.health + delta.health);
  if (delta.food   !== undefined) np.food   = clamp(np.food   + delta.food);
  if (delta.scrip  !== undefined) np.scrip  = clamp(np.scrip  + delta.scrip,  0, 999);
  if (delta.debt   !== undefined) np.debt   = clamp(np.debt   + delta.debt,   0, 999);
  if (delta.lung   !== undefined && np.character === "miner")
    np.lung = clamp(np.lung + delta.lung);
  if (delta.family !== undefined)
    np.children = Math.max(0, Math.min(10, np.children + delta.family));
  return np;
}

/** Build initial player state from setup selections */
function buildInitialPlayer(character, ethnicityId, campId, name) {
  const base = character === "miner"
    ? { health: 85, food: 60, scrip: 12, debt: 40, lung: 0 }
    : { health: 90, food: 60, scrip: 8,  debt: 40, lung: null };

  // Apply ethnicity bonuses
  if (ethnicityId === "appalachian") base.health += 8;
  // african: mutual aid network bonus is behavioral (checked during events), not a stat bonus
  if (ethnicityId === "italian")     base.food   += 12;
  if (ethnicityId === "hungarian")   base.debt   -= 8;
  // polish and welsh bonuses are behavioral (checked during events), not stat changes

  return {
    ...base,
    health:    clamp(base.health),
    food:      clamp(base.food),
    scrip:     clamp(base.scrip, 0, 999),
    debt:      clamp(base.debt,  0, 999),
    name,
    character,
    ethnicityId,
    campId,
    year:           START_YEAR,
    seasonIdx:      0,        // 0–3 index into SEASONS
    turn:           0,        // 0-based, 0–39
    children:       1,        // start with 1 child (2 adults + 1 child per spec)
    usedMilestones: [],       // list of milestone ids fired
    usedEvents:     [],       // last N event ids (avoids immediate repeats)
    lastWorkId:     null,     // work choice last turn (for double-shift lung tick)
    hungerTurns:    0,        // consecutive turns at food=0 (2 = starvation death)
    firstTurn:      true,     // show food tooltip
    nextBirthTurn:  6,        // turn on which next birth event becomes eligible
  };
}

/** Get the current season label */
function seasonLabel(p) {
  return SEASONS[p.seasonIdx];
}


// ─── REDUCER ─────────────────────────────────────────────────────────────────
// All player state mutations go through one dispatch call.
// (v1 bug fix: 10+ individual useState calls scattered through the component)

function playerReducer(state, action) {
  switch (action.type) {

    // Called once from startGame to set the initial player object
    case "__INIT__":
      return action.player;

    case "SEASON_TICK": {
      // Fires at the START of each new season, before player acts.
      let p = { ...state };
      const foodCost = 12 + (p.children * 3);
      p.food = clamp(p.food - foodCost);

      if (p.food === 0) {
        p.hungerTurns = (p.hungerTurns || 0) + 1;
      } else {
        p.hungerTurns = 0;
      }

      // Wife passive health drain: constant household labor wears her down
      if (p.character === "wife") {
        p.health = clamp(p.health - 3);
      }

      // Debt interest: if debt > 60, +2 scrip to debt each season
      if (p.debt > 60) {
        p.debt = clamp(p.debt + 2, 0, 999);
      }

      // Black lung passive: if miner worked double shifts last season, +1 passive
      if (p.character === "miner" && p.lastWorkId === "brutal") {
        p.lung = clamp(p.lung + 1);
      }

      p.firstTurn = false;
      return p;
    }

    case "APPLY_WORK": {
      // Apply work option deltas (scrip, health, lung, food)
      const { option } = action;
      let p = applyDeltas(state, option);
      p.lastWorkId = option.id;
      return p;
    }

    case "APPLY_CHOICE": {
      // Apply event choice deltas
      return applyDeltas(state, action.choice);
    }

    case "APPLY_PURCHASE": {
      const { item } = action;
      let p = { ...state };
      if (p.scrip < item.cost) return p; // shouldn't happen — UI guards it
      p.scrip  = clamp(p.scrip - item.cost, 0, 999);
      p.food   = clamp(p.food   + (item.food   || 0));
      p.health = clamp(p.health + (item.health || 0));
      if (p.character === "miner")
        p.lung = clamp(p.lung + (item.lung || 0));
      return p;
    }

    case "PAY_DEBT": {
      const { amount } = action;
      let p = { ...state };
      const pay = Math.min(amount, p.scrip, p.debt);
      p.scrip = clamp(p.scrip - pay, 0, 999);
      p.debt  = clamp(p.debt  - pay, 0, 999);
      return p;
    }

    case "VISIT_DOCTOR": {
      let p = { ...state };
      if (p.scrip < 10) return p;
      p.scrip  = clamp(p.scrip - 10, 0, 999);
      p.health = clamp(p.health + 28);
      return p;
    }

    case "ADVANCE_SEASON": {
      let p = { ...state };
      p.turn += 1;
      p.seasonIdx = (p.seasonIdx + 1) % 4;
      if (p.seasonIdx === 0) p.year += 1;
      return p;
    }

    case "MARK_MILESTONE": {
      return {
        ...state,
        usedMilestones: [...state.usedMilestones, action.id],
      };
    }

    case "TRACK_EVENT": {
      // Keep last 8 to avoid immediate repeats
      const used = [...state.usedEvents, action.id].slice(-8);
      return { ...state, usedEvents: used };
    }

    default:
      return state;
  }
}

  const bad = invert ? val > 0 : val < 0;
  return (
    <span style={{ ...S.deltaTag, color: bad ? C.red : C.green }}>

  const pct   = clamp((value / max) * 100);
  const color = warn && pct < 25 ? C.red
              : warn && pct < 50 ? C.yellow

  return (
    <div style={S.statRow}>
      <span style={S.statLbl}>{label}</span>
      <div style={S.statTrk}>
        <div style={{ width: `${pct}%`, background: color, height: "100%", transition: "width 0.25s" }} />

      <span style={{ ...S.statVal, color }}>{value}</span>

}

function Timeline({ player }) {
  const done = player.turn;
  const pct  = Math.round((done / TOTAL_TURNS) * 100);
  const left = TOTAL_TURNS - done;
  const milestoneYears = [1921, 1922, 1924, 1926, 1929];

  return (
    <div style={{ marginBottom: "12px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", fontSize:"11px", color:C.gray, marginBottom:"4px" }}>
        <span style={{ color: C.white }}>1920</span>
        <span style={{ color: C.yellow }}>SURVIVE TO 1929</span>
        <span style={{ color: C.white }}>1929</span>
      </div>
      <div style={{ position:"relative", background:"#222", height:"12px", border:`1px solid ${C.dgray}` }}>
        <div style={{ width:`${pct}%`, background:C.white, height:"100%", transition:"width 0.3s" }} />
        {milestoneYears.map(my => {
          const tickPct = ((my - START_YEAR) / (END_YEAR - START_YEAR)) * 100;
          return (
            <div key={my} style={{
              position:"absolute", top:0, left:`${tickPct}%`,
              width:"2px", height:"100%", background: C.dgray, opacity:0.8,

      <div style={{ fontSize:"11px", color:C.gray, marginTop:"4px" }}>
        {pct}% COMPLETE  ·  {left} SEASONS REMAINING

    </div>
  );
}

// ─── EVENT PICKER ─────────────────────────────────────────────────────────────
// Milestone check → random pool draw, deduplication, image resolution.
// Returns a fully-resolved event object ready for the event screen.

function pickEvent(player) {
  // 1. Check for a milestone this year that hasn't fired yet
  const milestone = MILESTONES.find(
    m => m.year === player.year && !player.usedMilestones.includes(m.id)
  );

  if (milestone) {
    const meData = MILESTONE_EVENTS[milestone.id];
    if (meData) {
      const variant = player.character === "miner" ? meData.miner : meData.wife;
      if (variant) {
        return { ...variant, _milestoneId: milestone.id };
      }
    }
  }

  // 2. Birth event — fires when turn >= nextBirthTurn and family cap not hit.
  // Uses a dedicated counter so milestones can never steal a birth slot.
  const birthId = player.character === "miner" ? "birth_miner" : "birth_wife";
  const birthEligible =
    player.turn >= (player.nextBirthTurn ?? 6) &&
    player.children < 10;

  if (birthEligible) {
    const pool = player.character === "miner" ? MINER_EVENTS : WIFE_EVENTS;
    const birthEvt = pool.find(e => e.id === birthId);
    if (birthEvt) return birthEvt;
  }

  // 3. Draw from character event pool, excluding gameOver events and avoiding recent repeats
  const pool = player.character === "miner" ? MINER_EVENTS : WIFE_EVENTS;
  const hasChildren = player.children > 0;
  const eligible = pool.filter(e =>
    !e.requiresChildren || hasChildren
  ).filter(e =>
    !e.gameOver && !e.birthEvent  // gameOver events are not in random rotation
  );
  const available = eligible.filter(e => !player.usedEvents.includes(e.id));
  const source = available.length > 0 ? available : eligible;

  if (source.length === 0) return null;
  return source[Math.floor(Math.random() * source.length)];
}


// ─── LOSS / WIN CONDITION CHECKS ─────────────────────────────────────────────

function checkLoss(player) {
  if (player.health <= 0)                              return "health";
  if (player.debt   >= 150)                            return "debt";
  if (player.hungerTurns >= 2)                         return "starvation";
  if (player.character === "miner" && player.lung >= 100) return "lung";
  return null;
}

function checkWin(player) {
  // Win when we've advanced past Winter 1929
  return player.year > END_YEAR;
}


// ─── SCREEN ROUTING ──────────────────────────────────────────────────────────
// Screens: "menu" | "setup" | "playing" | "event" | "store" | "end" | "won"

function CoalCountry() {
  const [screen,  setScreen]  = useState("menu");
  const [player,  dispatch]   = useReducer(playerReducer, null);

  // Audio state (lives here, passed down to AudioControls everywhere)
  const audioRef = useRef(null);
  const [muted,  setMuted]  = useState(false);
  const [volume, setVolume] = useState(0.35);

  // Setup wizard state
  const [setupStep, setSetupStep] = useState(0); // 0–3
  const [charType,  setCharType]  = useState(null);
  const [ethnicity, setEthnicity] = useState(null);
  const [camp,      setCamp]      = useState(null);
  const [nameVal,   setNameVal]   = useState("");

  // Game loop state
  const [event,      setEvent]     = useState(null);
  const [log,        setLog]       = useState([]);
  const [endReason,  setEndReason] = useState("");

  // Window width for responsive layout
  const [wide, setWide] = useState(window.innerWidth >= 650);
  useEffect(() => {
    const h = () => setWide(window.innerWidth >= 650);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);

  // ── Audio setup ────────────────────────────────────────────────────────────
  useEffect(() => {
    const audio = new Audio(AUDIO_URL);
    audio.loop  = true;
    audio.volume = volume;
    audioRef.current = audio;

    // Browser autoplay policy: start on first user interaction
    const tryPlay = () => {
      audio.play().catch(() => {});
      window.removeEventListener("click",   tryPlay);
      window.removeEventListener("keydown", tryPlay);
    };
    window.addEventListener("click",   tryPlay);
    window.addEventListener("keydown", tryPlay);

    return () => {
      audio.pause();
      window.removeEventListener("click",   tryPlay);
      window.removeEventListener("keydown", tryPlay);
    };
  }, []);

  useEffect(() => {
    if (audioRef.current) audioRef.current.volume = muted ? 0 : volume;
  }, [volume, muted]);

  // ── Log helper ──────────────────────────────────────────────────────────────
  const addLog = useCallback((msg) => setLog(prev => [msg, ...prev].slice(0, 16)), []);

  // ── Start game (from setup step 3) ──────────────────────────────────────────
  const startGame = useCallback(() => {
    const initialPlayer = buildInitialPlayer(charType, ethnicity, camp, nameVal.trim());
    dispatch({ type: "__INIT__", player: initialPlayer });
    const campLabel = COAL_CAMPS.find(c => c.id === camp)?.label || camp;
    setScreen("playing");
    addLog(`${nameVal.trim()} begins in ${campLabel}, Spring 1920.`);
  }, [charType, ethnicity, camp, nameVal]);

  // ── Reset ────────────────────────────────────────────────────────────────────
  const reset = useCallback(() => {
    setScreen("menu");
    setSetupStep(0);
    setCharType(null);
    setEthnicity(null);
    setCamp(null);
    setNameVal("");
    setEvent(null);
    setLog([]);
    setEndReason("");
  }, []);

  // ── Game loop helpers ────────────────────────────────────────────────────────
  // All game-loop functions compute state purely first, then dispatch once.
  // This avoids stale-closure bugs from dispatching incremental actions against
  // a player ref that hasn't re-rendered yet.

  const END_MSGS = {
    health:     "Your body finally gave out. Years of coal dust, poor food, and labor without rest took their toll. The company will have a new family in your house by Monday.",
    debt:       "The debt reached $150. The company agent arrived at dawn with a notice. You have 48 hours to vacate. There is no appeal in Fayette County.",
    starvation: "The family has gone without adequate food for two seasons running. The youngest doesn't recover. There is nothing left to hold the family together.",
    lung:       "The black lung took you at last. The company doctor had been certifying you fit for work for years — that was his job. Your lungs had been telling a different story. The dust wins eventually. It always does.",
  };

  /** Advance game state forward from a given player object. Pure — no side effects on player state. */
  const advanceFrom = useCallback((p) => {
    // 1. Season tick (food decay, debt interest, passive lung)
    p = playerReducer(p, { type: "SEASON_TICK" });

    // 2. Check loss
    const loss = checkLoss(p);
    if (loss) {
      dispatch({ type: "__INIT__", player: p });
      setEndReason(END_MSGS[loss]);
      setScreen("end");
      return;
    }

    // 3. Advance season/year counter
    p = playerReducer(p, { type: "ADVANCE_SEASON" });

    // 4. Check win
    if (checkWin(p)) {
      dispatch({ type: "__INIT__", player: p });
      setScreen("won");
      return;
    }

    // 5. Pick and show event
    const evt = pickEvent(p);
    if (evt && evt._milestoneId) {
      p = playerReducer(p, { type: "MARK_MILESTONE", id: evt._milestoneId });
    }
    // When a birth event fires, advance nextBirthTurn so the next birth
    // queues ~6 turns later regardless of what milestones may have blocked
    if (evt && evt.birthEvent) {
      p = { ...p, nextBirthTurn: p.turn + 6 };
    }

    dispatch({ type: "__INIT__", player: p });

    if (evt) {
      setEvent(evt);
      setScreen("event");
    }
    // If no event (empty pool — shouldn't happen with full data), just stay on playing
  }, []);

  // ── Handle work selection ───────────────────────────────────────────────────
  const handleWork = useCallback((option) => {
    // Apply work to current player, then run the season advance chain
    let p = playerReducer(player, { type: "APPLY_WORK", option });
    addLog(`${SEASONS[player.seasonIdx]} ${player.year}: ${option.label}`);
    advanceFrom(p);
  }, [player, advanceFrom]);

  // ── Handle event choice ──────────────────────────────────────────────────────
  const handleChoice = useCallback((choice) => {
    // Apply choice, track event, check loss, then return to playing screen
    let p = playerReducer(player, { type: "APPLY_CHOICE", choice });
    // Track in usedEvents (but not birth events — those use nextBirthTurn)
    if (event?.id && !event.birthEvent) p = playerReducer(p, { type: "TRACK_EVENT", id: event.id });

    addLog(`> ${choice.outcome || choice.text}`);

    const loss = checkLoss(p);
    if (loss) {
      dispatch({ type: "__INIT__", player: p });
      setEndReason(END_MSGS[loss]);
      setScreen("end");
      return;
    }

    dispatch({ type: "__INIT__", player: p });
    setEvent(null);
    setScreen("playing");
  }, [player, event]);

  // ── Handle doctor visit (stays on playing screen) ────────────────────────────
  const handleDoctor = useCallback(() => {
    if (!player || player.scrip < 10) return;
    dispatch({ type: "VISIT_DOCTOR" });
    addLog("Visited company doctor. -$10, +28 health.");
  }, [player]);

  // ── Handle pay debt ──────────────────────────────────────────────────────────
  const handlePayDebt = useCallback((amount) => {
    if (!player) return;
    const paid = Math.min(amount, player.scrip, player.debt);
    if (paid <= 0) return;
    dispatch({ type: "PAY_DEBT", amount: paid });
    addLog(`Paid $${paid} toward debt.`);
  }, [player]);


  // ── Audio controls shorthand for all screens ─────────────────────────────────
  const audioProps = { audioRef, muted, setMuted, volume, setVolume, wide };


  // ─── SCREEN: MENU ──────────────────────────────────────────────────────────
  if (screen === "menu") return (
    <div style={{ ...S.page, ...( wide ? S.padWide : S.pad ) }}>
      <AudioControls {...audioProps} />

      {/* Title image */}
      <div style={{ maxWidth:"800px", margin:"0 auto 20px", position:"relative" }}>
        <img
          src={img("title-scene")} alt="Coal Country"
          style={{ width:"100%", display:"block", imageRendering:"pixelated" }}
        />
        <div style={{
          position:"absolute", inset:0,
          background:"linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7))",
        }}/>
        <div style={{
          position:"absolute", bottom:"20px", left:0, right:0, textAlign:"center",
        }}>
          <div style={{ ...S.title, fontSize: wide ? "28px" : "18px" }}>COAL COUNTRY</div>
          <div style={{ ...S.sub }}>NEW RIVER GORGE · 1920–1929</div>
          <div style={{ ...S.sub }}>FAYETTE COUNTY COALFIELDS, WEST VIRGINIA</div>
        </div>
      </div>

      {/* Historical context */}
      <div style={{ maxWidth:"700px", margin:"0 auto 20px" }}>
        <div style={S.infoBox}>
          <p style={{ marginBottom:"10px" }}>
            In the coalfields of Fayette County, West Virginia, the company owned your house,
            the store where you bought your food, the doctor who certified you fit to work,
            and the preacher who told you strikes were sinful.
          </p>
          <p style={{ marginBottom:"10px" }}>
            You were paid in scrip — company currency — redeemable only at company stores
            that charged above-market prices. You owed before you started.
          </p>
          <p>
            This game is inspired by Oregon Trail: events reflect what typically happened
            to real people in this place and time. A few real events serve as anchors.
            The rest is the documented daily reality of coal camp life.
          </p>
        </div>

        <div style={{ textAlign:"center" }}>
          <button
            style={S.btnBig}
            onClick={() => setScreen("setup")}
            onKeyDown={e => e.key === "Enter" && setScreen("setup")}
          >
            PRESS ENTER TO BEGIN
          </button>
        </div>
      </div>

      <Footer />
    </div>
  );


  // ─── SCREEN: SETUP ─────────────────────────────────────────────────────────
  // 4-step linear wizard: role → ethnicity → camp → name
  if (screen === "setup") {
    const campData = COAL_CAMPS.find(c => c.id === camp);
    const ethData  = ETHNICITIES.find(e => e.id === ethnicity);

    // Keyboard: Enter on focused button triggers onClick
    const onKeyActivate = (fn) => (e) => { if (e.key === "Enter" || e.key === " ") fn(); };

    return (
    <div style={{ ...S.page, ...( wide ? S.padWide : S.pad ) }}>
      <AudioControls {...audioProps} />

      <div style={{ maxWidth:"660px", margin:"0 auto" }}>

        {/* Back-to-menu + step indicator */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"16px" }}>
          <button style={S.btnSm} onClick={reset}>&lt; MENU</button>
          <span style={{ fontSize:"11px", color:C.dgray, letterSpacing:"2px" }}>
            STEP {setupStep + 1} OF 4
          </span>
          {/* Progress pip row */}
          <div style={{ display:"flex", gap:"6px" }}>
            {[0,1,2,3].map(i => (
              <div key={i} style={{
                width:"10px", height:"10px",
                background: i <= setupStep ? C.white : C.dgray,
                border: `1px solid ${i <= setupStep ? C.white : C.dgray}`,
              }}/>
            ))}
          </div>
        </div>
        <HR />

        {/* ── STEP 0: Choose role ───────────────────────────────────────────── */}
        {setupStep === 0 && (
          <>
            <div style={{ color:C.gray, fontSize:"11px", marginBottom:"16px", lineHeight:2 }}>
              Choose who you will play as:
            </div>

            {[
              {
                id: "miner", label: "Coal Miner", imgKey: "miner",
                lines: [
                  "Works underground, full or partial weeks",
                  "Tracks health AND black lung separately",
                  "Navigates union politics and company pressure",
                  "Starting scrip: $12  ·  Starting health: 85",
                ],
              },
              {
                id: "wife", label: "Miner's Wife", imgKey: "wife",
                lines: [
                  "Keeps the family fed and the house standing",
                  "Earns supplemental income — baking, laundry, boarders",
                  "Controls food more directly than the miner",
                  "Starting scrip: $8  ·  Starting health: 90",
                ],
              },
            ].map(c => (
              <button
                key={c.id}
                style={{ ...S.btn, ...(charType === c.id ? S.btnSelected : {}) }}
                onClick={() => setCharType(c.id)}
                onKeyDown={onKeyActivate(() => setCharType(c.id))}
              >
                <div style={{ display:"flex", alignItems:"center", gap:"14px", marginBottom:"8px" }}>
                  <img
                    src={img(c.imgKey)} alt={c.label}
                    style={{ width:"72px", height:"72px", imageRendering:"pixelated", flexShrink:0 }}

                  <span style={{
                    color: charType === c.id ? C.yellow : C.white,
                    fontSize: "14px", lineHeight: 1.6,

                    {charType === c.id ? "> " : "  "}{c.label}

                </div>
                {c.lines.map((l, i) => (
                  <div key={i} style={{ color:C.gray, fontSize:"11px", marginLeft:"86px", lineHeight:1.9 }}>

              </button>

            {charType && (
              <div style={{ textAlign:"right", marginTop:"8px" }}>
                <button
                  style={S.btnBig}
                  onClick={() => setSetupStep(1)}
                  onKeyDown={onKeyActivate(() => setSetupStep(1))}
                >
                  NEXT &gt;
                </button>
              </div>
            )}
          </>
        )}

        {/* ── STEP 1: Choose ethnicity ──────────────────────────────────────── */}
        {setupStep === 1 && (
          <>
            <div style={{ color:C.gray, fontSize:"11px", marginBottom:"16px", lineHeight:2 }}>
              The mines drew workers from across America and the world.<br/>

            </div>

            {ETHNICITIES.map(e => (
              <button
                key={e.id}

                onKeyDown={onKeyActivate(() => setEthnicity(e.id))}
              >
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:"4px" }}>

                    marginTop:"10px", paddingTop:"10px",
                    borderTop:`1px solid ${C.dgray}`,

                    {e.note}
                  </div>

            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:"8px" }}>
              <button style={S.btnSm} onClick={() => setSetupStep(0)}>&lt; BACK</button>
              {ethnicity && (
                <button
                  style={S.btnBig}
                  onClick={() => setSetupStep(2)}
                  onKeyDown={onKeyActivate(() => setSetupStep(2))}
                >
                  NEXT &gt;
                </button>
              )}
            </div>
          </>
        )}

        {/* ── STEP 2: Choose coal camp ──────────────────────────────────────── */}
        {setupStep === 2 && (
          <>
            <div style={{ color:C.gray, fontSize:"11px", marginBottom:"16px", lineHeight:2 }}>

            {COAL_CAMPS.map(c => (
              <button

            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:"8px" }}>

                  onClick={() => setSetupStep(3)}
                  onKeyDown={onKeyActivate(() => setSetupStep(3))}

        {/* ── STEP 3: Enter name + summary card ────────────────────────────── */}
        {setupStep === 3 && (

              value={nameVal}
              onChange={e => setNameVal(e.target.value)}
              onKeyDown={e => {

              placeholder="your name..."
              autoFocus
              maxLength={30}
            />

            {/* Summary card — built from actual choices, never hardcoded */}
            {nameVal.trim().length > 1 && (
              <div style={{ marginTop:"20px" }}>
                <div style={S.infoBox}>
                  <SectionLabel>YOUR STORY — SPRING 1920</SectionLabel>

                  {/* Name + role */}
                  <div style={{ marginBottom:"6px" }}>
                    <span style={{ color:C.white }}>{nameVal.trim()}</span>
                    <span style={{ color:C.gray }}>  ·  {charType === "miner" ? "Coal Miner" : "Miner's Wife"}</span>
                  </div>

                  {/* Origin */}
                  {ethData && (
                    <div style={{ color:C.gray, fontSize:"11px", marginBottom:"6px" }}>
                      {ethData.origin}
                    </div>
                  )}

                  <HR />

                  {/* Camp info */}
                  {campData && (
                    <>
                      <div style={{ fontSize:"11px", marginBottom:"3px" }}>
                        <span style={{ color:C.gray }}>Camp:  </span>
                        <span style={{ color:C.white }}>{campData.label}</span>
                      </div>
                      <div style={{ fontSize:"11px", marginBottom:"3px" }}>
                        <span style={{ color:C.gray }}>Company:  </span>
                        <span style={{ color:C.white }}>{campData.company}</span>
                      </div>
                      <div style={{ fontSize:"11px", marginBottom:"10px" }}>
                        <span style={{ color:C.gray }}>County:  </span>
                        <span style={{ color:C.white }}>{campData.county}</span>
                      </div>
                    </>
                  )}

                  {/* Starting stats */}
                  <div style={{ fontSize:"11px", color:C.gray, marginBottom:"3px" }}>
                    Family: 2 adults, 1 child
                  </div>
                  <div style={{ fontSize:"11px", color:C.gray, marginBottom:"3px" }}>
                    Starting debt: <span style={{ color:C.white }}>${charType === "miner" ? "40" : "40"} scrip</span>
                    <span style={{ color:C.dgray }}> (company advance on housing)</span>
                  </div>
                  <div style={{ fontSize:"11px", color:C.gray, marginBottom:"10px" }}>
                    Starting scrip: <span style={{ color:C.white }}>${charType === "miner" ? "12" : "8"}</span>
                  </div>

                  {/* Ethnicity bonus */}
                  {ethData && (
                    <div style={{
                      fontSize:"11px", color:C.green,
                      borderTop:`1px solid ${C.dgray}`, paddingTop:"8px",
                    }}>
                      Bonus: {ethData.bonusLabel}
                    </div>
                  )}
                </div>

                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <button style={S.btnSm} onClick={() => setSetupStep(2)}>&lt; BACK</button>
                  <button
                    style={S.btnBig}
                    onClick={startGame}
                    onKeyDown={onKeyActivate(startGame)}
                  >
                    BEGIN JOURNEY &gt;
                  </button>
                </div>
              </div>
            )}

            {/* Back button even before name is entered */}
            {nameVal.trim().length <= 1 && (
              <div style={{ marginTop:"12px" }}>
                <button style={S.btnSm} onClick={() => setSetupStep(2)}>&lt; BACK</button>
              </div>
            )}
          </>
        )}

      </div>
      <Footer />
    </div>
    );
  }


  // ─── SCREEN: PLAYING ───────────────────────────────────────────────────────
  if (screen === "playing" && player) {
    const campData    = COAL_CAMPS.find(c => c.id === player.campId);
    const workOptions = (WORK_OPTIONS[player.character] || []).filter(opt => {
      // Garden only available in Summer (1) and Fall (2) — not Winter (3) or Spring (0)
      if (opt.id === "garden" && (player.seasonIdx === 0 || player.seasonIdx === 3)) return false;
      return true;
    });
    const seasonImg   = { Spring:"spring", Summer:"summer", Fall:"autumn", Winter:"winter" }[seasonLabel(player)];
    const debtColor   = player.debt > 120 ? C.red : player.debt > 80 ? C.yellow : C.white;
    const canDoctor   = player.character === "miner" && player.scrip >= 10;
    const canPayDebt  = player.scrip > 0 && player.debt > 0;
    const logSlice    = log.slice(0, 5);

    // Stat panel — reused in both layouts
    const StatPanel = (
      <div style={{ marginBottom:"14px" }}>
        <SectionLabel>STATS</SectionLabel>
        <StatBar label="HEALTH"     value={player.health} warn />
        <StatBar label="FOOD"       value={player.food}   warn />
        {player.character === "miner" && (
          <StatBar label="BLACK LUNG" value={player.lung} />
        )}
        <div style={{ display:"flex", gap:"20px", marginTop:"8px", fontSize:"11px" }}>
          <span style={{ color:C.gray }}>SCRIP: <span style={{ color:C.white }}>${player.scrip}</span></span>
          <span style={{ color:C.gray }}>DEBT: <span style={{ color:debtColor }}>${player.debt}</span></span>
        </div>
        <div style={{ fontSize:"11px", color:C.dgray, marginTop:"4px" }}>
          2 adults · {player.children} child{player.children !== 1 ? "ren" : ""}
        </div>
      </div>
    );

    // Work option buttons — used in both layouts
    const WorkSection = (
      <>
        <div style={{ fontSize:"11px", color:C.gray, marginBottom:"10px", letterSpacing:"2px" }}>
          HOW DO YOU WORK THIS SEASON?
        </div>
        {player.firstTurn && (
          <div style={{
            border:`1px solid ${C.yellow}`, background:"#1a1600",
            padding:"10px 12px", marginBottom:"12px", fontSize:"11px",
            color:C.yellow, lineHeight:2,
          }}>
            ⚠ Food drops every season. Visit the Company Store to restock — or your family goes hungry.
          </div>
        )}
        {workOptions.map(opt => (
          <button
            key={opt.id}
            style={S.btn}
            onClick={() => handleWork(opt)}
          >
            <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"6px" }}>
              <img
                src={img(opt.icon)} alt=""
                style={{ width:"48px", height:"48px", imageRendering:"pixelated", flexShrink:0 }}
              />
              <div style={{ flex:1 }}>
                <div style={{ color:C.white, marginBottom:"4px" }}>{opt.label}</div>
                <div style={{ color:C.dgray, fontSize:"11px", lineHeight:1.8 }}>{opt.desc}</div>
              </div>
              <div style={{ textAlign:"right", flexShrink:0, fontSize:"11px" }}>
                {opt.scrip  !== 0 && <DeltaBadge val={opt.scrip}  unit="$"       />}
                {opt.health !== 0 && <DeltaBadge val={opt.health} unit="hp"      />}
                {opt.food   !== 0 && <DeltaBadge val={opt.food}   unit=" food"   />}
                {player.character === "miner" && opt.lung !== 0 &&
                  <DeltaBadge val={opt.lung} unit=" lung" invert />}
              </div>
            </div>
          </button>
        ))}
      </>
    );

    // Action buttons row — store, doctor, pay debt
    const ActionButtons = (
      <div style={{ marginTop:"12px" }}>
        <HR />
        <div style={{ display:"flex", flexWrap:"wrap", gap:"8px", marginTop:"4px" }}>
          {/* Company Store */}
          <button
            style={{ ...S.btnSm, color:C.yellow, borderColor:C.dgray, padding:"8px 12px" }}
            onClick={() => setScreen("store")}
          >
            [S] COMPANY STORE
          </button>

          {/* Visit Doctor — miner only, grayed if can't afford */}
          {player.character === "miner" && (
            <button
              style={{
                ...S.btnSm, padding:"8px 12px",
                color: canDoctor ? C.white : C.dgray,
                borderColor: canDoctor ? C.dgray : "#222",
                cursor: canDoctor ? "pointer" : "not-allowed",
              }}
              onClick={canDoctor ? handleDoctor : undefined}
              disabled={!canDoctor}
              title={canDoctor ? "Visit company doctor (-$10, +28 health)" : "Need $10 scrip"}

          )}

          {/* Pay Debt */}
          {canPayDebt && (
            <button

    return (

              <div style={{ flexShrink:0, width: wide ? "44%" : "100%", marginBottom: wide ? 0 : "16px" }}>
                <img
                  src={img(event.img)} alt=""
                  style={{ width:"100%", display:"block", imageRendering:"pixelated",
                           borderBottom:`2px solid ${C.dgray}` }}
                />
              </div>
            )}

            {/* Narrative + choices */}
            <div style={{ flex:1 }}>

              {/* Headline */}
              <div style={S.hl}>{event.headline?.toUpperCase()}</div>

              {/* Narrative body */}
              <div style={S.narr}>{event.narrative}</div>

              {/* Historical fact box */}
              {event.fact && (
                <div style={S.factBox}>
                  <div style={{ color:C.green, fontSize:"11px", letterSpacing:"2px", marginBottom:"6px" }}>
                    -- HISTORICAL RECORD --
                  </div>
                  {event.fact}
                </div>
              )}

              <HR />

              {/* Game-over events: single button, no branching */}
              {event.gameOver ? (
                <div style={{ textAlign:"center", margin:"20px 0" }}>
                  <div style={{ color:C.red, fontSize:"14px", letterSpacing:"2px", marginBottom:"20px", lineHeight:1.8 }}>
                    [ GAME OVER ]
                  </div>
                  {player && (
                    <div style={{ color:C.dgray, fontSize:"11px", lineHeight:2, marginBottom:"20px" }}>
                      {player.name}  ·  Year {player.year}  ·  {player.turn} seasons survived
                    </div>
                  )}
                  <button style={S.btnBig} onClick={reset}>PLAY AGAIN</button>
                </div>
              ) : (
                <>
                  <div style={{ fontSize:"11px", color:C.gray, marginBottom:"12px", letterSpacing:"1px" }}>
                    WHAT DO YOU DO?
                  </div>

                  {/* Choice buttons */}
                  {event.choices?.map((c, i) => (
                    <button
                      key={i}
                      style={S.btn}
                      onClick={() => handleChoice(c)}
                    >
                      {/* Choice text + delta badges */}
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom: c.outcome ? "6px" : 0, gap:"8px" }}>
                        <span style={{ color:C.white, flex:1 }}>{c.text}</span>
                        <span style={{ flexShrink:0, textAlign:"right" }}>
                          {c.health !== 0 && <DeltaBadge val={c.health} unit="hp"      />}
                          {c.scrip  !== 0 && <DeltaBadge val={c.scrip}  unit="$"       />}
                          {c.debt   !== 0 && <DeltaBadge val={-c.debt}  unit="$ debt"  />}
                          {c.food   !== 0 && <DeltaBadge val={c.food}   unit=" food"   />}
                          {isMiner && c.lung !== 0 &&
                            <DeltaBadge val={c.lung} unit=" lung" invert />}
                        </span>
                      </div>
                      {/* Outcome text */}
                      {c.outcome && (
                        <div style={{ color:C.dgray, fontSize:"11px", lineHeight:1.8 }}>
                          &gt; {c.outcome}
                        </div>
                      )}
                    </button>
                  ))}
                </>
              )}

            </div>
          </div>
        </div>
        <Footer />
      </div>
    );
  }


  // ─── SCREEN: STORE ────────────────────────────────────────────────────────
  if (screen === "store" && player) {
    const campData = COAL_CAMPS.find(c => c.id === player.campId);

    const handleBuy = (item) => {
      if (player.scrip < item.cost) return;
      dispatch({ type: "APPLY_PURCHASE", item });
      addLog(`Bought ${item.label} for $${item.cost}.`);
    };

    return (
      <div style={{ ...S.page, ...( wide ? S.padWide : S.pad ) }}>
        <AudioControls {...audioProps} />
        <div style={{ maxWidth:"660px", margin:"0 auto" }}>

          {/* Store interior image */}
          <img
            src={img("store-interior")} alt="Company Store"
            style={{ width:"100%", display:"block", imageRendering:"pixelated",
                     borderBottom:`2px solid ${C.dgray}`, marginBottom:"16px" }}
          />

          {/* Header */}
          <div style={{ color:C.white, fontSize:"13px", letterSpacing:"2px", marginBottom:"4px" }}>
            {campData ? campData.company.toUpperCase() : "COMPANY STORE"}
          </div>
          <div style={{ color:C.gray, fontSize:"11px", letterSpacing:"2px", marginBottom:"14px" }}>
            COMPANY STORE  ·  {campData ? campData.label.toUpperCase() : ""}
          </div>

          {/* Historical fact box */}
          <div style={S.factBox}>
            <div style={{ color:C.green, fontSize:"11px", letterSpacing:"2px", marginBottom:"6px" }}>
              -- HISTORICAL RECORD --
            </div>
            Company stores charged above-market prices and paid workers in scrip redeemable only
            at company establishments. The truck system was technically illegal under WV law but
            rarely enforced until the 1930s. You owed before you started, and the store made sure
            you kept owing.
          </div>

          {/* Current scrip and debt */}
          <div style={{ fontSize:"13px", marginBottom:"14px" }}>
            <span style={{ color:C.gray }}>SCRIP: </span>
            <span style={{ color:C.white }}>${player.scrip}</span>
            {"     "}
            <span style={{ color:C.gray }}>DEBT: </span>
            <span style={{ color: player.debt > 120 ? C.red : player.debt > 80 ? C.yellow : C.white }}>
              ${player.debt}
            </span>
          </div>
          <HR />

          {/* Store items */}
          {STORE_ITEMS.map(item => {
            const minerOnly = item.minerOnly && player.character !== "miner";
            const canAfford = player.scrip >= item.cost && !minerOnly;
            return (
              <button
                key={item.id}
                style={{
                  ...S.btn,
                  ...(minerOnly ? { opacity:0.35, cursor:"not-allowed" } : {}),
                  ...(!canAfford && !minerOnly ? { opacity:0.55, cursor:"not-allowed" } : {}),
                }}
                onClick={() => canAfford ? handleBuy(item) : undefined}
                disabled={!canAfford}
              >
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:"4px" }}>
                  <span style={{ color: canAfford ? C.white : C.gray }}>{item.label}</span>
                  <span style={{ color:C.yellow, fontSize:"11px" }}>${item.cost} scrip</span>
                </div>
                <div style={{ color:C.dgray, fontSize:"11px", lineHeight:1.8 }}>
                  {item.desc}
                  {item.food   > 0 && <DeltaBadge val={item.food}   unit=" food" />}
                  {item.health > 0 && <DeltaBadge val={item.health} unit="hp"    />}
                  {item.lung   < 0 && <DeltaBadge val={item.lung}   unit=" lung" invert />}
                  {minerOnly && <span style={{ color:C.dgray }}> (miners only)</span>}
                  {!canAfford && !minerOnly && <span style={{ color:C.dgray }}> (need ${item.cost})</span>}
                </div>
              </button>
            );
          })}

          <HR />
          <button style={S.btnSm} onClick={() => setScreen("playing")}>&lt; BACK TO CAMP</button>
        </div>
        <Footer />
      </div>
    );
  }


  // ─── SCREEN: END ──────────────────────────────────────────────────────────
  if (screen === "end") {
    const isDebt       = endReason.includes("evict") || endReason.includes("debt") || endReason.includes("$150");
    const isStarvation = endReason.includes("food") || endReason.includes("starv");
    const isLung       = endReason.includes("black lung") || endReason.includes("dust wins");
    const endImg       = isDebt ? "evicted" : "graveyard";

    return (
      <div style={{ ...S.page, ...( wide ? S.padWide : S.pad ) }}>
        <AudioControls {...audioProps} />
        <div style={{ maxWidth:"800px", margin:"0 auto" }}>

          <div style={{ display:"flex", flexDirection: wide ? "row" : "column", gap:"28px", alignItems:"flex-start" }}>

            {/* End image */}
            <div style={{ flexShrink:0, width: wide ? "44%" : "100%", marginBottom: wide ? 0 : "16px" }}>
              <img
                src={img(endImg)} alt=""
                style={{ width:"100%", display:"block", imageRendering:"pixelated",
                         borderBottom:`2px solid ${C.dgray}` }}
              />
            </div>

            {/* End text */}
            <div style={{ flex:1 }}>
              <HR />
              <div style={{ textAlign:"center", color:C.red, fontSize:"17px", margin:"20px 0", lineHeight:1.8, letterSpacing:"2px" }}>
                THE STORY<br/>ENDS HERE
              </div>
              <HR />

              <div style={{ fontSize:"13px", color:C.offwhite, lineHeight:2.2, marginBottom:"16px" }}>
                {endReason}
              </div>

              {player && (
                <div style={{ color:C.dgray, fontSize:"11px", lineHeight:2, marginBottom:"16px" }}>
                  <div>{player.name}  ·  {player.character === "miner" ? "Coal Miner" : "Miner's Wife"}</div>
                  <div>Year {player.year}  ·  {player.turn} season{player.turn !== 1 ? "s" : ""} survived</div>
                  <div>Final health: {player.health}  ·  Final debt: ${player.debt}</div>
                  {player.character === "miner" && <div>Black lung: {player.lung}/100</div>}
                </div>
              )}

              {/* Historical note on end screen */}
              <div style={S.factBox}>
                <div style={{ color:C.green, fontSize:"11px", letterSpacing:"2px", marginBottom:"6px" }}>
                  -- HISTORICAL RECORD --
                </div>
                {isDebt
                  ? "Company evictions of miners' families were often carried out within 48 hours. The family might be left on the road with their furniture. Neighboring families sometimes took them in. The company had a new worker in the house by the following week."
                  : isStarvation
                  ? "Food insecurity was endemic in coal camps. When wages stopped — during strikes, closures, or dockings — the company store debt climbed regardless. Many families survived on credit that kept them permanently obligated to the company."
                  : isLung
                  ? "Black lung disease (pneumoconiosis) was not officially recognized as a compensable occupational disease in West Virginia until 1969. For decades, coal companies called it 'miners' asthma' and company doctors certified men fit for work until they could no longer stand."
                  : "Black lung, injury, and exhaustion ended working lives long before old age. WV coal mines killed over 20,000 workers between 1900 and 1940. Most families received nothing from the company after a death."
                }
              </div>

              <div style={{ textAlign:"center", marginTop:"20px" }}>
                <button style={S.btnBig} onClick={reset}>PLAY AGAIN</button>
              </div>
            </div>

          </div>
        </div>
        <Footer />
      </div>
    );
  }


  // ─── SCREEN: WON ──────────────────────────────────────────────────────────
  if (screen === "won" && player) {
    const ethData  = ETHNICITIES.find(e => e.id === player.ethnicityId);
    const campData = COAL_CAMPS.find(c => c.id === player.campId);
    const isMiner  = player.character === "miner";

    // Personalized epilogue paragraphs
    const epilogue = {
      miner: {
        appalachian: "The Depression came for the hills you were born in just as it came for everywhere else. The company cut shifts. Some mines shuttered. The men who stayed found work where they could — gardens, odd jobs, anything. The union that Blair Mountain almost broke would come back in 1933, when Roosevelt's New Deal gave workers the right to organize. You were still here when it did.",
        african:     "You had come north for something better and found something harder. The mine paid you less per ton than the white miners for the same coal, and assigned you the worst sections — but you had stayed. The mutual aid networks that kept Black families alive in these camps were the same ones that would seed the civil rights organizing of the next generation.",
        italian:     "Your family's rolls had fed men underground for a decade. The pepperoni roll — your grandmother's recipe, adapted for WV — had become something this county called its own. The Depression hit hard, but the network of Italian families in the camps had learned to survive harder things than a market collapse.",
        hungarian:   "You had planned to earn enough and go home. The mountains had other plans. The family you had built here — in this company town, in this gorge, in these hills — was the life you had made instead of the one you had planned. The Depression was just one more thing the plan hadn't included.",
        polish:      "The language, the church, the Thursday evenings at Emma's — none of it had belonged to the company, no matter how much they owned of everything else. The Depression arrived at the end of a decade that had already taken everything it could from you. You were still here.",
        welsh:       "Your father had organized in the Rhondda. You had passed leaflets near the tipple and met with men the company was watching. The union that had been crushed at Blair Mountain was stirring again. The New Deal would give it law to stand on. You had kept the tradition alive long enough to see it.",
      },
      wife: {
        appalachian: "You had kept the family fed through ten years of dockings, price rises, and seasons when the garden was the only thing that worked. The Depression arrived at the end of a decade that had already demanded everything you had. You were still here, still doing the arithmetic that kept the family alive.",
        african:     "The mutual aid networks you had helped build on the row — the food sharing, the informal funds, the Thursday meetings — had kept more than one family from the road. They would keep doing it through the Depression. The organizing that started in the coal camps traveled north with the families who left, and it didn't stop when it arrived.",
        italian:     "Two dozen pepperoni rolls every Friday had bought you something the company store couldn't take: income they couldn't dock, money they couldn't convert to scrip. The Depression tried. The rolls kept selling. The boarding house still wanted them. You kept baking.",
        hungarian:   "You had watched your husband send money home for years, watched the plan to return slowly become the decision to stay. The Depression arrived at the end of that slow decision. You were in these mountains now, and so were your children, and their children would be too.",
        polish:      "The community had held. The language, the faith, the women's circle — none of it had required the company's permission, and none of it had asked for it. What the Depression couldn't do, the coal dust couldn't do, and the inspections couldn't do — you had outlasted it.",
        welsh:       "You had kept watch over your husband's organizing work from a careful distance — close enough to warn him when the detectives came, far enough to keep the children safe if the eviction notice arrived. The union came back with the New Deal. You had kept the household alive long enough for that to matter.",
      },
    };

    const epilogueText = epilogue[isMiner ? "miner" : "wife"]?.[player.ethnicityId]
      || "You survived ten years that broke most families. The Depression arrived at the end of them, as if the decade had been saving its worst for last. You were still here.";

    const historicalCoda = "The Social Security Act passed in 1935. The labor organizing that coal miners helped build — through the Paint Creek strikes, through Blair Mountain, through ten thousand smaller acts of resistance — made it possible. You had been part of that, whether you knew it or not.";

    const closingLine = ethData?.closingLine || "";

    return (
      <div style={{ ...S.page, ...( wide ? S.padWide : S.pad ) }}>
        <AudioControls {...audioProps} />
        <div style={{ maxWidth:"800px", margin:"0 auto" }}>

          {/* Victory image */}
          <img
            src={img("victory")} alt="Victory"
            style={{ width:"100%", display:"block", imageRendering:"pixelated",
                     borderBottom:`2px solid ${C.dgray}`, marginBottom:"16px" }}
          />

          {/* Victory headline */}
          <div style={{ textAlign:"center", color:C.green, fontSize:"17px", marginBottom:"8px", lineHeight:1.8, letterSpacing:"2px" }}>
            SURVIVED TO 1929
          </div>
          <div style={{ textAlign:"center", color:C.white, fontSize:"13px", marginBottom:"20px", letterSpacing:"1px" }}>
            {player.name}  ·  {isMiner ? "Coal Miner" : "Miner's Wife"}
            {campData && `  ·  ${campData.label}`}
          </div>
          <HR />

          {/* Epilogue */}
          <div style={{ fontSize:"13px", color:C.offwhite, lineHeight:2.2, marginBottom:"14px" }}>
            {epilogueText}
          </div>
          <div style={{ fontSize:"13px", color:C.offwhite, lineHeight:2.2, marginBottom:"20px" }}>
            {historicalCoda}
          </div>
          <HR />

          {/* ── VICTORY CERTIFICATE ─────────────────────────────────────── */}
          <div id="certificate" style={{
            border: "6px double #8a6a2a",
            padding: wide ? "36px 48px" : "24px 20px",
            margin: "20px 0",
            background: "#1a1408",
            fontFamily: "Georgia, serif",
            textAlign: "center",
            position: "relative",
          }}>
            {/* Corner ornaments */}
            {["top:8px;left:8px","top:8px;right:8px","bottom:8px;left:8px","bottom:8px;right:8px"].map((pos, i) => (
              <div key={i} style={{
                position:"absolute",
                ...Object.fromEntries(pos.split(";").map(p => p.split(":"))),
                color:"#8a6a2a", fontSize:"18px", lineHeight:1,
              }}>✦</div>
            ))}

            <div style={{ color:"#c8a850", fontSize: wide ? "15px" : "12px", letterSpacing:"4px", marginBottom:"6px", fontFamily:FONT }}>
              CERTIFICATE OF SURVIVAL
            </div>
            <div style={{ color:"#8a6a2a", fontSize:"11px", letterSpacing:"2px", marginBottom:"20px" }}>
              ── ✦ ──
            </div>

            <div style={{ color:"#e8d8a0", fontSize:"12px", lineHeight:2, marginBottom:"16px" }}>
              <div style={{ marginBottom:"4px" }}>This certifies that</div>
              <div style={{ color:"#ffffff", fontSize: wide ? "16px" : "13px", fontFamily:FONT, letterSpacing:"2px", margin:"8px 0" }}>
                {player.name}
              </div>
              {ethData && (
                <div style={{ color:"#c8a850", fontSize:"11px", marginBottom:"8px" }}>
                  {ethData.origin}
                </div>
              )}
              <div>survived ten years of company-town life</div>
              <div>in the Fayette County coalfields,</div>
              <div>West Virginia, 1920–1929.</div>
            </div>

            <div style={{ color:"#8a6a2a", fontSize:"11px", letterSpacing:"2px", marginBottom:"16px" }}>── ✦ ──</div>

            {/* Final stats */}
            <div style={{ color:"#c8a850", fontSize:"11px", lineHeight:2.2, marginBottom:"16px" }}>
              <div>Seasons survived: {player.turn} of 40</div>
              <div>Final health: {player.health}/100</div>
              <div>Final debt: ${player.debt}</div>
              {isMiner && <div>Black lung: {player.lung}/100</div>}
            </div>

            <div style={{ color:"#8a6a2a", fontSize:"11px", letterSpacing:"2px", marginBottom:"16px" }}>── ✦ ──</div>

            {/* Ethnicity closing line */}
            {closingLine && (
              <div style={{ color:"#e8d8a0", fontSize:"11px", lineHeight:2, fontStyle:"italic", marginBottom:"16px", padding:"0 20px" }}>
                "{closingLine}"
              </div>
            )}

            <div style={{ color:"#8a6a2a", fontSize:"11px", lineHeight:2, marginTop:"8px" }}>
              * The Social Security Act passed in 1935.<br/>
              The labor organizing that coal miners<br/>
              helped build made it possible.
            </div>
          </div>
          {/* ── end certificate ── */}

          {/* Print + play again */}
          <div style={{ display:"flex", justifyContent:"center", gap:"16px", marginTop:"20px", flexWrap:"wrap" }}>
            <button
              style={{ ...S.btnSm, color:C.white, borderColor:C.dgray, padding:"10px 16px" }}
              onClick={() => window.print()}
            >
              🖨 PRINT / SAVE CERTIFICATE
            </button>
            <button style={S.btnBig} onClick={reset}>PLAY AGAIN</button>
          </div>

        </div>
        <Footer />
      </div>
    );
  }

  return null;
}


function App() {
  return <CoalCountry />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
